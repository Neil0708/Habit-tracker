<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>STREAK · daily tracker</title>
<style>
  :root{
    --bg:#0a0a0f;
    --panel:#13131c;
    --panel-2:#1a1a26;
    --line:#262633;
    --ink:#eef0f7;
    --muted:#7c7f93;
    --dim:#4a4d5e;
    --xp:#00e08a;        /* signature green */
    --xp-glow:#00ff9d;
    --gold:#ffc94d;
    --fire:#ff6b35;
    --violet:#a78bfa;
    --radius:16px;
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;}
  body{
    min-height:100vh;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(0,224,138,.07), transparent 60%),
      radial-gradient(700px 500px at 0% 110%, rgba(167,139,250,.06), transparent 55%),
      var(--bg);
    padding:24px 16px 80px;
  }
  .wrap{max-width:780px;margin:0 auto;}

  /* ---------- header ---------- */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
  .brand{display:flex;flex-direction:column;gap:2px;}
  .brand h1{
    font-size:clamp(28px,7vw,40px);font-weight:800;letter-spacing:-.04em;line-height:.9;
    display:flex;align-items:center;gap:10px;
  }
  .brand h1 .dot{width:11px;height:11px;border-radius:50%;background:var(--xp);box-shadow:0 0 16px var(--xp-glow);animation:pulse 2.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(.82)}}
  .brand .sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;}
  .datebox{text-align:right;font-family:var(--mono);}
  .datebox .day{font-size:13px;color:var(--ink);font-weight:600;}
  .datebox .since{font-size:11px;color:var(--dim);margin-top:2px;}

  /* ---------- ring ---------- */
  .ringcard{
    background:linear-gradient(160deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;margin-bottom:18px;display:flex;align-items:center;gap:22px;
    position:relative;overflow:hidden;
  }
  .ring{position:relative;width:104px;height:104px;flex:none;}
  .ring svg{transform:rotate(-90deg);}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .pct b{font-size:26px;font-weight:800;letter-spacing:-.03em;}
  .ring .pct span{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;}
  .ringmeta{flex:1;min-width:0;}
  .ringmeta .h{font-size:15px;font-weight:700;margin-bottom:4px;}
  .ringmeta .p{font-size:13px;color:var(--muted);line-height:1.5;}
  .ringmeta .stats{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap;}
  .stat{display:flex;flex-direction:column;}
  .stat b{font-family:var(--mono);font-size:18px;font-weight:700;}
  .stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .stat.fire b{color:var(--fire);}
  .stat.gold b{color:var(--gold);}

  /* ---------- section headings ---------- */
  .seclabel{display:flex;align-items:center;gap:10px;margin:24px 4px 12px;}
  .seclabel h2{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .seclabel .rule{flex:1;height:1px;background:var(--line);}

  /* ---------- habit rows ---------- */
  .habits{display:flex;flex-direction:column;gap:8px;}
  .habit{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;display:flex;align-items:center;gap:14px;
    transition:border-color .2s,background .2s,transform .08s;
    position:relative;overflow:hidden;
  }
  .habit.done{border-color:rgba(0,224,138,.4);background:linear-gradient(100deg,rgba(0,224,138,.07),var(--panel) 60%);}
  .habit:active{transform:scale(.995);}
  .check{
    width:30px;height:30px;border-radius:9px;border:2px solid var(--dim);
    flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all .2s;background:transparent;position:relative;
  }
  .check:hover{border-color:var(--xp);}
  .check.on{background:var(--xp);border-color:var(--xp);box-shadow:0 0 14px rgba(0,255,157,.45);}
  .check svg{width:16px;height:16px;stroke:#06140d;stroke-width:3.5;fill:none;
    stroke-dasharray:24;stroke-dashoffset:24;transition:stroke-dashoffset .25s ease .05s;}
  .check.on svg{stroke-dashoffset:0;}
  .hbody{flex:1;min-width:0;}
  .hname{font-size:15px;font-weight:600;letter-spacing:-.01em;}
  .hmeta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:12px;align-items:center;}
  .hmeta .strk{color:var(--fire);}
  .hmeta .strk.cold{color:var(--dim);}
  .htime{font-family:var(--mono);font-size:13px;color:var(--xp);min-width:54px;text-align:right;}
  .htime.zero{color:var(--dim);}
  .timerbtn{
    width:34px;height:34px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--ink);cursor:pointer;flex:none;
    display:flex;align-items:center;justify-content:center;transition:all .18s;
  }
  .timerbtn:hover{border-color:var(--xp);color:var(--xp);}
  .timerbtn.running{background:var(--fire);border-color:var(--fire);color:#1a0a04;animation:tick 1s infinite;}
  @keyframes tick{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.5)}50%{box-shadow:0 0 0 7px rgba(255,107,53,0)}}
  .timerbtn svg{width:15px;height:15px;fill:currentColor;}

  /* running banner */
  .runbar{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    background:var(--fire);color:#1a0a04;font-family:var(--mono);font-weight:700;
    padding:10px 18px;border-radius:999px;display:none;align-items:center;gap:12px;
    box-shadow:0 8px 30px rgba(255,107,53,.4);z-index:40;font-size:14px;
  }
  .runbar.show{display:flex;}
  .runbar button{background:#1a0a04;color:var(--fire);border:none;border-radius:999px;padding:5px 12px;font-family:var(--mono);font-weight:700;cursor:pointer;font-size:12px;}

  /* ---------- todos ---------- */
  .todocard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;}
  .todoadd{display:flex;gap:8px;margin-bottom:12px;}
  .todoadd input{
    flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:11px 13px;color:var(--ink);font-family:var(--font);font-size:14px;outline:none;
  }
  .todoadd input:focus{border-color:var(--xp);}
  .todoadd button{
    background:var(--xp);color:#06140d;border:none;border-radius:10px;padding:0 18px;
    font-weight:700;cursor:pointer;font-size:14px;transition:transform .1s;
  }
  .todoadd button:active{transform:scale(.94);}
  .todolist{display:flex;flex-direction:column;gap:2px;}
  .todo{display:flex;align-items:center;gap:12px;padding:9px 4px;border-radius:8px;transition:background .15s;}
  .todo:hover{background:var(--panel-2);}
  .tcheck{width:22px;height:22px;border-radius:7px;border:2px solid var(--dim);flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
  .tcheck:hover{border-color:var(--violet);}
  .tcheck.on{background:var(--violet);border-color:var(--violet);}
  .tcheck.on svg{opacity:1;}
  .tcheck svg{width:12px;height:12px;stroke:#0d0816;stroke-width:3.5;fill:none;opacity:0;}
  .ttext{flex:1;font-size:14px;transition:all .2s;}
  .todo.done .ttext{color:var(--dim);text-decoration:line-through;}
  .tdel{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;line-height:1;padding:0 6px;opacity:0;transition:opacity .15s;}
  .todo:hover .tdel{opacity:1;}
  .tdel:hover{color:var(--fire);}
  .todoempty{text-align:center;color:var(--dim);font-size:13px;padding:18px 0;font-family:var(--mono);}
  .weekreset{font-family:var(--mono);font-size:10px;color:var(--dim);text-align:right;margin-top:10px;letter-spacing:.06em;}

  /* ---------- footer ---------- */
  footer{margin-top:34px;text-align:center;}
  .resetbtn{background:none;border:1px solid var(--line);color:var(--dim);font-family:var(--mono);font-size:11px;padding:8px 16px;border-radius:999px;cursor:pointer;letter-spacing:.06em;transition:all .2s;}
  .resetbtn:hover{border-color:var(--fire);color:var(--fire);}

  /* confetti canvas */
  #fx{position:fixed;inset:0;pointer-events:none;z-index:60;}

  /* ---------- PUSHH button ---------- */
  .pushh{
    position:fixed;right:20px;bottom:20px;z-index:45;
    background:linear-gradient(135deg,var(--fire),#ff3d6e);
    color:#fff;border:none;border-radius:999px;
    font-family:var(--mono);font-weight:800;font-size:18px;letter-spacing:.06em;
    padding:16px 26px;cursor:pointer;
    box-shadow:0 8px 30px rgba(255,61,110,.5),0 0 0 0 rgba(255,107,53,.5);
    transition:transform .12s;animation:pushpulse 2.6s infinite;
  }
  .pushh:hover{transform:scale(1.06);}
  .pushh:active{transform:scale(.92);}
  @keyframes pushpulse{
    0%,100%{box-shadow:0 8px 30px rgba(255,61,110,.5),0 0 0 0 rgba(255,107,53,.55);}
    50%{box-shadow:0 8px 38px rgba(255,61,110,.6),0 0 0 16px rgba(255,107,53,0);}
  }

  /* ---------- overlays ---------- */
  .overlay{
    position:fixed;inset:0;z-index:80;display:none;
    align-items:center;justify-content:center;padding:24px;
    background:rgba(5,5,9,.82);backdrop-filter:blur(8px);
  }
  .overlay.show{display:flex;animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0}to{opacity:1}}

  .quotecard{
    max-width:620px;text-align:center;position:relative;
    animation:slamin .5s cubic-bezier(.18,1.3,.4,1);
  }
  @keyframes slamin{0%{transform:scale(.6) translateY(30px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
  .qmark{
    font-family:Georgia,serif;font-size:120px;line-height:.5;color:var(--xp);
    opacity:.35;height:60px;margin-bottom:10px;
  }
  .qtext{
    font-size:clamp(26px,5.5vw,44px);font-weight:800;letter-spacing:-.03em;
    line-height:1.12;color:var(--ink);margin-bottom:22px;
    text-wrap:balance;
  }
  .qauthor{
    font-family:var(--mono);font-size:14px;color:var(--xp);
    letter-spacing:.1em;text-transform:uppercase;margin-bottom:34px;
  }
  .qbtns{display:flex;gap:12px;justify-content:center;}
  .qagain{
    background:var(--xp);color:#06140d;border:none;border-radius:999px;
    font-family:var(--mono);font-weight:800;font-size:15px;letter-spacing:.06em;
    padding:13px 30px;cursor:pointer;transition:transform .1s;
  }
  .qagain:active{transform:scale(.93);}
  .qclose{
    background:none;border:1px solid var(--line);color:var(--muted);
    border-radius:999px;font-family:var(--mono);font-size:13px;
    padding:13px 24px;cursor:pointer;transition:all .18s;
  }
  .qclose:hover{border-color:var(--fire);color:var(--fire);}

  /* ---------- reels ---------- */
  .reelcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;}
  .reelgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .reel{
    position:relative;border-radius:11px;overflow:hidden;cursor:pointer;
    aspect-ratio:16/10;background:var(--panel-2);border:1px solid var(--line);
    transition:transform .12s,border-color .18s;
  }
  .reel:hover{transform:translateY(-2px);border-color:var(--fire);}
  .reel img{width:100%;height:100%;object-fit:cover;display:block;}
  .reel .play{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(transparent 40%,rgba(0,0,0,.65));
  }
  .reel .play svg{width:42px;height:42px;fill:#fff;filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));opacity:.92;transition:transform .15s;}
  .reel:hover .play svg{transform:scale(1.15);}
  .reel .rdel{
    position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:7px;
    background:rgba(5,5,9,.7);border:none;color:#fff;cursor:pointer;font-size:15px;
    line-height:1;opacity:0;transition:opacity .15s;z-index:2;
  }
  .reel:hover .rdel{opacity:1;}
  .reel .rdel:hover{background:var(--fire);}
  .reelempty{grid-column:1/-1;text-align:center;color:var(--dim);font-size:13px;padding:18px 0;font-family:var(--mono);}

  .reel-ext{background:linear-gradient(150deg,var(--panel-2),var(--panel));}
  .reel-ext .extbody{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:10px;text-align:center;}
  .reel-ext .extlabel{font-family:var(--mono);font-weight:800;font-size:15px;letter-spacing:.02em;}
  .reel-ext .exthint{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em;}
  .reel-ext::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--src) 16%,transparent),transparent 70%);}

  .vidwrap{width:min(900px,100%);}
  .vidframe{position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:#000;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .vidframe iframe{width:100%;height:100%;border:0;display:block;}
  .vidwrap .qclose{margin:16px auto 0;display:block;}

  /* toast */
  .toast{
    position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
    background:var(--panel-2);border:1px solid var(--xp);color:var(--ink);
    padding:11px 20px;border-radius:999px;font-weight:600;font-size:14px;z-index:70;
    opacity:0;transition:all .35s cubic-bezier(.22,1.2,.4,1);display:flex;align-items:center;gap:9px;
    box-shadow:0 10px 40px rgba(0,224,138,.25);
  }
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .toast .em{font-size:17px;}

  @media (max-width:560px){
    .ringcard{flex-direction:column;text-align:center;}
    .ringmeta .stats{justify-content:center;}
    .htime{min-width:46px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div class="toast" id="toast"><span class="em">⚡</span><span id="toastmsg"></span></div>

<div class="wrap">
  <header>
    <div class="brand">
      <h1><span class="dot"></span>STREAK</h1>
      <div class="sub">do the thing · every day</div>
    </div>
    <div class="datebox">
      <div class="day" id="today"></div>
      <div class="since" id="since"></div>
    </div>
  </header>

  <!-- daily ring -->
  <div class="ringcard">
    <div class="ring">
      <svg width="104" height="104">
        <circle cx="52" cy="52" r="46" fill="none" stroke="var(--line)" stroke-width="9"/>
        <circle id="ringfill" cx="52" cy="52" r="46" fill="none" stroke="var(--xp)" stroke-width="9"
          stroke-linecap="round" stroke-dasharray="289" stroke-dashoffset="289"
          style="transition:stroke-dashoffset .6s cubic-bezier(.22,1,.36,1);filter:drop-shadow(0 0 6px rgba(0,255,157,.6));"/>
      </svg>
      <div class="pct"><b id="ringpct">0%</b><span id="ringcount">0/0</span></div>
    </div>
    <div class="ringmeta">
      <div class="h" id="ringtitle">Let's get moving</div>
      <div class="p" id="ringsub">Check off a habit to start your day.</div>
      <div class="stats">
        <div class="stat fire"><b id="bestoverall">0</b><span>day streak</span></div>
        <div class="stat gold"><b id="totaldays">0</b><span>perfect days</span></div>
        <div class="stat"><b id="totalhrs">0h</b><span>logged total</span></div>
      </div>
    </div>
  </div>

  <!-- habits -->
  <div class="seclabel"><h2>Daily</h2><div class="rule"></div></div>
  <div class="habits" id="habits"></div>

  <!-- todos -->
  <div class="seclabel"><h2>This Week</h2><div class="rule"></div></div>
  <div class="todocard">
    <div class="todoadd">
      <input id="todoinput" placeholder="add a task…" maxlength="80">
      <button id="todoadd">Add</button>
    </div>
    <div class="todolist" id="todolist"></div>
    <div class="weekreset" id="weekreset"></div>
  </div>

  <!-- hype reels -->
  <div class="seclabel"><h2>Hype Reels</h2><div class="rule"></div></div>
  <div class="reelcard">
    <div class="todoadd">
      <input id="reelinput" placeholder="paste a YouTube, Instagram, TikTok link…">
      <button id="reeladd">Add</button>
    </div>
    <div class="reelgrid" id="reelgrid"></div>
  </div>

  <footer>
    <button class="resetbtn" id="reset">reset everything</button>
  </footer>
</div>

<!-- PUSHH floating button -->
<button class="pushh" id="pushh">PUSHH</button>

<!-- quote overlay -->
<div class="overlay" id="quoteOverlay">
  <div class="quotecard">
    <div class="qmark">"</div>
    <div class="qtext" id="qtext"></div>
    <div class="qauthor" id="qauthor"></div>
    <div class="qbtns">
      <button class="qagain" id="qagain">AGAIN</button>
      <button class="qclose" id="qclose">close</button>
    </div>
  </div>
</div>

<!-- video overlay -->
<div class="overlay" id="vidOverlay">
  <div class="vidwrap">
    <div class="vidframe" id="vidframe"></div>
    <button class="qclose" id="vidclose">close</button>
  </div>
</div>

<div class="runbar" id="runbar">
  <span id="runlabel">●</span>
  <span id="runtime">00:00</span>
  <button id="runstop">STOP</button>
</div>

<script>
"use strict";
/* ============ config ============ */
const HABITS = ["Study","Workout","Guitar","Work","Read","Dutch"];
const START_DATE = "2026-06-26";
const LS = "streak_app_v1";

/* ============ state ============ */
const blank = () => ({
  days:{},          // "YYYY-MM-DD": { Study:{done:bool, secs:int}, ... }
  todos:[],         // {id, text, done}
  reels:[],         // {id, url, vid, title}
  weekStart:null,   // ISO monday of current week
  perfectDays:0,
  totalSecs:0
});
let S = load();

function load(){
  try{
    const raw = localStorage.getItem(LS);
    if(!raw) return blank();
    const p = JSON.parse(raw);
    return Object.assign(blank(), p);
  }catch(e){ return blank(); }
}
function save(){ localStorage.setItem(LS, JSON.stringify(S)); }

/* ============ dates ============ */
function ymd(d){ return d.toLocaleDateString('en-CA'); } // YYYY-MM-DD local
function todayKey(){ return ymd(new Date()); }
function mondayOf(d){
  const x = new Date(d); const day = (x.getDay()+6)%7; // 0=mon
  x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x;
}
function dayRecord(key){
  if(!S.days[key]){
    S.days[key] = {};
    HABITS.forEach(h => S.days[key][h] = {done:false, secs:0});
  }
  // backfill missing habits if config changed
  HABITS.forEach(h => { if(!S.days[key][h]) S.days[key][h]={done:false,secs:0}; });
  return S.days[key];
}

/* streak: consecutive days (ending today/yesterday) where ALL habits done.
   we use per-day "all done" for the headline streak. */
function currentStreak(){
  let streak = 0;
  let d = new Date();
  // if today not complete, streak can still count up to yesterday
  for(let i=0;i<400;i++){
    const key = ymd(d);
    const rec = S.days[key];
    const allDone = rec && HABITS.every(h => rec[h] && rec[h].done);
    if(allDone){ streak++; }
    else{
      // allow today to be incomplete without breaking the streak yet
      if(i===0){ d.setDate(d.getDate()-1); continue; }
      break;
    }
    d.setDate(d.getDate()-1);
  }
  return streak;
}

/* ============ week / todo reset ============ */
function checkWeekReset(){
  const m = ymd(mondayOf(new Date()));
  if(S.weekStart !== m){
    if(S.weekStart){ S.todos = []; } // new week wipes todos
    S.weekStart = m;
    save();
  }
}

/* ============ sound ============ */
let AC=null;
function actx(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function blip(freqs, dur=0.12, type='sine', gain=0.18){
  const a=actx(); if(!a) return;
  const t=a.currentTime;
  freqs.forEach((f,i)=>{
    const o=a.createOscillator(), g=a.createGain();
    o.type=type; o.frequency.value=f;
    o.connect(g); g.connect(a.destination);
    const st=t+i*0.06;
    g.gain.setValueAtTime(0,st);
    g.gain.linearRampToValueAtTime(gain,st+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,st+dur);
    o.start(st); o.stop(st+dur+0.02);
  });
}
const SND={
  check:()=>blip([523.25,783.99],0.14,'sine',0.16),

/* ============ confetti ============ */
const cvs=document.getElementById('fx'), ctx=cvs.getContext('2d');
let parts=[], raf=null;
function fitCanvas(){ cvs.width=innerWidth; cvs.height=innerHeight; }
fitCanvas(); addEventListener('resize',fitCanvas);
const COLORS=['#00e08a','#00ff9d','#ffc94d','#ff6b35','#a78bfa','#ffffff'];
function burst(x,y,n=34,power=1){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2, sp=(2+Math.random()*7)*power;
    parts.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-3,
      g:0.16+Math.random()*0.1,life:1,
      size:3+Math.random()*5,rot:Math.random()*6,vr:(Math.random()-.5)*0.4,
      c:COLORS[Math.random()*COLORS.length|0],shape:Math.random()>0.5?'r':'c'});
  }
  if(!raf) raf=requestAnimationFrame(loop);
}
function loop(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life-=0.012;
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c;
    if(p.shape==='r') ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*1.6);
    else{ ctx.beginPath(); ctx.arc(0,0,p.size/1.4,0,7); ctx.fill(); }
    ctx.restore();
  });
  if(parts.length) raf=requestAnimationFrame(loop);
  else{ ctx.clearRect(0,0,cvs.width,cvs.height); raf=null; }
}
function confettiAt(el,n,power){
  const r=el.getBoundingClientRect();
  burst(r.left+r.width/2, r.top+r.height/2, n, power);
}

/* ============ toast ============ */
let toastT=null;
function toast(msg,emoji='⚡'){
  const t=document.getElementById('toast');
  document.getElementById('toastmsg').textContent=msg;
  t.querySelector('.em').textContent=emoji;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2200);
}
const HYPE=["nice.","keep going.","on a roll.","let's go.","clean.","stacking up.","yes.","locked in.","that's the stuff.","momentum."];

/* ============ timer ============ */
let timer={habit:null, start:0, int:null};
function fmt(secs){
  const h=Math.floor(secs/3600), m=Math.floor(secs%3600/60), s=Math.floor(secs%60);
  if(h>0) return h+"h "+String(m).padStart(2,'0')+"m";
  if(m>0) return m+"m";
  return s+"s";
}
function fmtClock(secs){
  const m=Math.floor(secs/60), s=Math.floor(secs%60);
  return String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
}
function startTimer(habit){
  if(timer.habit) stopTimer(); // only one at a time
  timer.habit=habit; timer.start=Date.now();
  SND.timer();
  const bar=document.getElementById('runbar');
  bar.classList.add('show');
  document.getElementById('runlabel').textContent="● "+habit;
  timer.int=setInterval(()=>{
    const el=Math.floor((Date.now()-timer.start)/1000);
    document.getElementById('runtime').textContent=fmtClock(el);
    if(el>0 && el%60===0) SND.tick();
  },250);
  render();
}
function stopTimer(){
  if(!timer.habit) return;
  const el=Math.floor((Date.now()-timer.start)/1000);
  const key=todayKey(), rec=dayRecord(key);
  rec[timer.habit].secs += el;
  S.totalSecs += el;
  const wasDone=rec[timer.habit].done;
  rec[timer.habit].done=true; // auto-check
  clearInterval(timer.int);
  document.getElementById('runbar').classList.remove('show');
  const h=timer.habit; timer={habit:null,start:0,int:null};
  save();
  if(el>=5 && !wasDone){ afterCheck(h,true); }
  else if(el>=5){ toast("+"+fmt(el)+" on "+h,'⏱️'); }
  render();
}

/* ============ check logic ============ */
function toggleHabit(h){
  const key=todayKey(), rec=dayRecord(key);
  rec[h].done=!rec[h].done;
  if(rec[h].done){ afterCheck(h,false); }
  else{ SND.uncheck(); }
  save(); render();
}
function afterCheck(h, fromTimer){
  SND.check();
  const card=document.querySelector('[data-habit="'+h+'"] .check');
  if(card) confettiAt(card,26,1);
  // check if day just became perfect
  const rec=dayRecord(todayKey());
  const allDone=HABITS.every(x=>rec[x].done);
  if(allDone){
    S.perfectDays = countPerfectDays();
    save();
    setTimeout(()=>{
      SND.perfect();
      burst(innerWidth/2, innerHeight*0.35, 90, 1.6);
      const st=currentStreak();
      toast("PERFECT DAY · "+st+" day streak 🔥",'🏆');
    },260);
  }else{
    toast(HYPE[Math.random()*HYPE.length|0],'⚡');
  }
}
function countPerfectDays(){
  let n=0;
  for(const k in S.days){
    if(HABITS.every(h=>S.days[k][h]&&S.days[k][h].done)) n++;
  }
  return n;
}

/* per-habit streak (consecutive days that habit was done, today optional) */
function habitStreak(h){
  let s=0, d=new Date();
  for(let i=0;i<400;i++){
    const rec=S.days[ymd(d)];
    if(rec && rec[h] && rec[h].done){ s++; }
    else if(i===0){ d.setDate(d.getDate()-1); continue; }
    else break;
    d.setDate(d.getDate()-1);
  }
  return s;
}

/* ============ todos ============ */
function addTodo(){
  const inp=document.getElementById('todoinput');
  const v=inp.value.trim(); if(!v) return;
  S.todos.push({id:Date.now()+''+Math.random(),text:v,done:false});
  inp.value=''; save(); SND.todo(); renderTodos();
}
function toggleTodo(id){
  const t=S.todos.find(x=>x.id===id); if(!t) return;
  t.done=!t.done;
  if(t.done){ SND.todo(); const el=document.querySelector('[data-todo="'+id+'"] .tcheck'); if(el) confettiAt(el,18,0.8); toast(HYPE[Math.random()*HYPE.length|0],'✅'); }
  save(); renderTodos();
}
function delTodo(id){ S.todos=S.todos.filter(x=>x.id!==id); save(); renderTodos(); }

/* ============ render ============ */
function render(){
  const key=todayKey(), rec=dayRecord(key);
  // habits
  const wrap=document.getElementById('habits');
  wrap.innerHTML='';
  HABITS.forEach(h=>{
    const data=rec[h];
    const running = timer.habit===h;
    const strk=habitStreak(h);
    const div=document.createElement('div');
    div.className='habit'+(data.done?' done':'');
    div.dataset.habit=h;
    div.innerHTML=`
      <button class="check ${data.done?'on':''}" aria-label="toggle ${h}">
        <svg viewBox="0 0 24 24"><path d="M4 12 L10 18 L20 5"/></svg>
      </button>
      <div class="hbody">
        <div class="hname">${h}</div>
        <div class="hmeta">
          <span class="strk ${strk>0?'':'cold'}">🔥 ${strk}d</span>
          <span>${data.secs>0?'logged today':''}</span>
        </div>
      </div>
      <div class="htime ${data.secs?'':'zero'}">${data.secs?fmt(data.secs):'—'}</div>
      <button class="timerbtn ${running?'running':''}" aria-label="timer ${h}">
        ${running
          ? '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>'
          : '<svg viewBox="0 0 24 24"><path d="M8 5 L8 19 L19 12 Z"/></svg>'}
      </button>`;
    div.querySelector('.check').onclick=()=>toggleHabit(h);
    div.querySelector('.timerbtn').onclick=()=> running?stopTimer():startTimer(h);
    wrap.appendChild(div);
  });
  // ring
  const done=HABITS.filter(h=>rec[h].done).length, total=HABITS.length;
  const pct=Math.round(done/total*100);
  const off=289-(289*done/total);
  document.getElementById('ringfill').style.strokeDashoffset=off;
  document.getElementById('ringpct').textContent=pct+'%';
  document.getElementById('ringcount').textContent=done+'/'+total;
  const rt=document.getElementById('ringtitle'), rs=document.getElementById('ringsub');
  if(done===0){ rt.textContent="Let's get moving"; rs.textContent="Check off a habit to start your day."; }
  else if(done<total){ rt.textContent=done+" down, "+(total-done)+" to go"; rs.textContent="Close the ring. You're nearly there."; }
  else{ rt.textContent="Perfect day 🏆"; rs.textContent="Everything done. Come back tomorrow and keep it alive."; }
  // stats
  document.getElementById('bestoverall').textContent=currentStreak();
  document.getElementById('totaldays').textContent=countPerfectDays();
  const hrs=S.totalSecs/3600;
  document.getElementById('totalhrs').textContent= hrs>=1? hrs.toFixed(hrs<10?1:0)+'h' : Math.round(S.totalSecs/60)+'m';
  renderTodos();
  renderReels();
}
function renderTodos(){
  const list=document.getElementById('todolist');
  list.innerHTML='';
  if(!S.todos.length){
    list.innerHTML='<div class="todoempty">nothing yet — add your first task ↑</div>';
  }else{
    S.todos.forEach(t=>{
      const d=document.createElement('div');
      d.className='todo'+(t.done?' done':'');
      d.dataset.todo=t.id;
      d.innerHTML=`
        <button class="tcheck ${t.done?'on':''}"><svg viewBox="0 0 24 24"><path d="M4 12 L10 18 L20 5"/></svg></button>
        <div class="ttext">${escapeHtml(t.text)}</div>
        <button class="tdel">×</button>`;
      d.querySelector('.tcheck').onclick=()=>toggleTodo(t.id);
      d.querySelector('.tdel').onclick=()=>delTodo(t.id);
      list.appendChild(d);
    });
  }
  // week reset note
  const next=mondayOf(new Date()); next.setDate(next.getDate()+7);
  document.getElementById('weekreset').textContent='list clears '+next.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ============ reels ============ */
function parseYouTube(url){
  // returns 11-char video id or null
  const patterns=[
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtube\.com\/live\/)([A-Za-z0-9_-]{11})/,
    /[?&]v=([A-Za-z0-9_-]{11})/
  ];
  for(const p of patterns){ const m=url.match(p); if(m) return m[1]; }
  return null;
}
function reelSource(url){
  const u=url.toLowerCase();
  if(u.includes('instagram.com')) return {label:'Instagram', color:'#e1306c'};
  if(u.includes('tiktok.com')) return {label:'TikTok', color:'#25f4ee'};
  if(u.includes('twitter.com')||u.includes('x.com')) return {label:'X', color:'#ffffff'};
  if(u.includes('vimeo.com')) return {label:'Vimeo', color:'#1ab7ea'};
  if(u.includes('facebook.com')||u.includes('fb.watch')) return {label:'Facebook', color:'#1877f2'};
  try{ return {label:new URL(url).hostname.replace(/^www\./,''), color:'#7c7f93'}; }
  catch(e){ return {label:'Link', color:'#7c7f93'}; }
}
function addReel(){
  const inp=document.getElementById('reelinput');
  let url=inp.value.trim(); if(!url) return;
  if(!/^https?:\/\//i.test(url)) url='https://'+url; // tolerate missing scheme
  const vid=parseYouTube(url);
  if(vid){
    if(S.reels.some(r=>r.vid===vid)){ toast('already in your reels','👀'); inp.value=''; return; }
    S.reels.push({id:Date.now()+''+Math.random(), url, vid, type:'yt'});
    toast('reel added 🎬','🎬');
  }else{
    // any other link -> external
    if(S.reels.some(r=>r.url===url)){ toast('already in your reels','👀'); inp.value=''; return; }
    const src=reelSource(url);
    S.reels.push({id:Date.now()+''+Math.random(), url, type:'ext', label:src.label, color:src.color});
    toast(src.label+' link added 🔗','🔗');
  }
  inp.value=''; save(); SND.todo(); renderReels();
}
function delReel(id){ S.reels=S.reels.filter(r=>r.id!==id); save(); renderReels(); }
function playReel(vid){
  const fr=document.getElementById('vidframe');
  fr.innerHTML='<iframe src="https://www.youtube-nocookie.com/embed/'+vid+'?autoplay=1&rel=0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>';
  document.getElementById('vidOverlay').classList.add('show');
}
function closeVid(){
  document.getElementById('vidOverlay').classList.remove('show');
  document.getElementById('vidframe').innerHTML=''; // kill playback
}
function renderReels(){
  const grid=document.getElementById('reelgrid');
  grid.innerHTML='';
  if(!S.reels.length){
    grid.innerHTML='<div class="reelempty">paste a YouTube, Insta or TikTok link to stash your hype vids ↑</div>';
    return;
  }
  S.reels.forEach(r=>{
    const d=document.createElement('div');
    d.className='reel';
    if(r.type==='ext'){
      d.classList.add('reel-ext');
      d.style.setProperty('--src',r.color||'#7c7f93');
      d.innerHTML=`
        <div class="extbody">
          <div class="extlabel" style="color:${r.color||'#7c7f93'}">${escapeHtml(r.label||'Link')}</div>
          <div class="exthint">tap to open ↗</div>
        </div>
        <button class="rdel" aria-label="remove">×</button>`;
      d.querySelector('.extbody').onclick=()=>window.open(r.url,'_blank','noopener');
    }else{
      d.innerHTML=`
        <img src="https://i.ytimg.com/vi/${r.vid}/mqdefault.jpg" loading="lazy" alt="reel"
          onerror="this.src='https://i.ytimg.com/vi/${r.vid}/hqdefault.jpg'">
        <div class="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <button class="rdel" aria-label="remove">×</button>`;
      d.querySelector('.play').onclick=()=>playReel(r.vid);
      d.querySelector('img').onclick=()=>playReel(r.vid);
    }
    d.querySelector('.rdel').onclick=(e)=>{e.stopPropagation();delReel(r.id);};
    grid.appendChild(d);
  });
}
